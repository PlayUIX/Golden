<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Golden">
<link rel="manifest" href="manifest.json">
<title>Golden Cardapio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bk:#0A0A0A;--wh:#FFFFFF;--off:#F6F6F6;--bd:#E4E4E4;
  --mut:#888;--gold:#C8A020;
  --sh:0 2px 12px rgba(0,0,0,.07);--sh2:0 8px 32px rgba(0,0,0,.11);
  --r:14px;--rsm:10px;--font:'Inter',sans-serif;
}
html,body{height:100%;background:var(--off);color:var(--bk);font-family:var(--font);overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd)}

/* PAGES */
.pg{display:none;min-height:100dvh;flex-direction:column}
.pg.on{display:flex}

/* SPLASH */
#pgSplash{background:var(--bk);justify-content:center;align-items:center;position:fixed;inset:0;z-index:9000;transition:opacity .5s ease}
#pgSplash.out{opacity:0;pointer-events:none}
.spl-logo{width:80px;height:80px;object-fit:contain;animation:sf 3s ease-in-out infinite}
@keyframes sf{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* TOPBAR */
.tb{height:56px;background:var(--bk);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:200;flex-shrink:0}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-logo{width:28px;height:28px;object-fit:contain}
.tb-title{color:var(--wh);font-size:15px;font-weight:700}
.tb-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:background .15s}
.tb-btn:hover{background:rgba(255,255,255,.18)}

/* SETUP */
#pgSetup{background:var(--wh);justify-content:flex-start;align-items:center;overflow-y:auto;-webkit-overflow-scrolling:touch}
.setup-wrap{width:min(400px,100%);padding:36px 20px 40px;display:flex;flex-direction:column;align-items:center}
.setup-logo{width:84px;height:84px;object-fit:contain;margin-bottom:20px;filter:drop-shadow(0 4px 16px rgba(200,160,32,.28))}
.setup-h{font-size:22px;font-weight:800;margin-bottom:4px;text-align:center}
.setup-s{font-size:13.5px;color:var(--mut);margin-bottom:28px;text-align:center}
.lbl{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);display:block;margin-bottom:5px}
.field{width:100%;margin-bottom:13px}
.field input{width:100%;padding:13px 14px;background:var(--off);border:1.5px solid var(--bd);border-radius:var(--rsm);font-size:15px;font-family:var(--font);font-weight:500;color:var(--bk);outline:none;transition:border-color .16s}
.field input:focus{border-color:var(--bk);background:var(--wh)}
.area-lbl{font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);width:100%;margin-bottom:8px}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;margin-bottom:18px}
.acard{background:var(--off);border:1.5px solid var(--bd);border-radius:var(--rsm);padding:10px 12px;cursor:pointer;transition:all .14s}
.acard:hover{border-color:#bbb}
.acard.sel{border-color:var(--bk);background:var(--bk)}
.acard-nome{font-size:12px;font-weight:600;color:var(--bk);line-height:1.3}
.acard.sel .acard-nome{color:var(--wh)}
.setup-err{color:#c02828;font-size:12px;font-weight:600;margin-bottom:10px;display:none}
.setup-err.on{display:block}
.btn-primary{width:100%;height:52px;background:var(--bk);color:var(--wh);border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);box-shadow:0 4px 16px rgba(0,0,0,.16);transition:all .16s}
.btn-primary:hover{background:#222;transform:translateY(-1px)}
.btn-primary:active{transform:none}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* USER PAGE */
#pgUser{background:var(--off);overflow-y:auto;-webkit-overflow-scrolling:touch}
.u-body{padding:14px 13px 100px}
.wk-chip{display:inline-flex;background:var(--wh);border:1px solid var(--bd);border-radius:50px;padding:5px 13px;font-size:11.5px;font-weight:600;color:var(--mut);margin-bottom:14px;box-shadow:var(--sh)}
.greet-name{font-size:21px;font-weight:800;margin-bottom:2px}
.greet-area{font-size:12.5px;color:var(--mut);font-weight:500;margin-bottom:18px}
/* day sections */
.dsec{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:9px;overflow:hidden;box-shadow:var(--sh)}
.dsec-hd{padding:13px 14px 11px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.dsec-day{font-size:14px;font-weight:700}
.dsec-lbl{font-size:11px;font-weight:600;color:var(--mut)}
.dsec-lbl.done{color:#1A7A40}
.dish-list{padding:10px 11px 12px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dish-it{border-radius:12px;cursor:pointer;border:2.5px solid var(--bd);transition:all .15s;background:var(--wh);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh)}
.dish-it:hover{border-color:#aaa;transform:translateY(-1px)}
.dish-it.sel{border-color:var(--bk);background:var(--bk);box-shadow:0 4px 16px rgba(0,0,0,.18)}
.dish-it.sel .di-name{color:var(--wh)}
.di-dot{display:none}
.di-dot-in{display:none}
.di-photo{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;border-bottom:1px solid var(--bd)}
.dish-it.sel .di-photo{border-bottom-color:rgba(255,255,255,.15)}
.di-ph{width:100%;aspect-ratio:4/3;background:var(--off);display:flex;align-items:center;justify-content:center;color:#ccc;border-bottom:1px solid var(--bd)}
.dish-it.sel .di-ph{background:#1a1a1a;border-bottom-color:rgba(255,255,255,.1);color:#555}
.di-name{font-size:13px;font-weight:700;color:var(--bk);line-height:1.35;padding:9px 10px 10px;flex:1}
.dish-it.sel .di-name{color:var(--wh)}
/* footer */
.send-ft{position:fixed;bottom:0;left:0;right:0;background:var(--wh);border-top:1px solid var(--bd);padding:11px 13px 18px;box-shadow:0 -4px 16px rgba(0,0,0,.06);z-index:100}
.send-info{font-size:12px;color:var(--mut);font-weight:500;margin-bottom:8px}
.send-info strong{color:var(--bk)}
.btn-wa{width:100%;height:50px;background:#25D366;color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 16px rgba(37,211,102,.28);transition:all .16s}
.btn-wa:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn-wa:active{transform:none}
/* done */
.done-box{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:28px 16px;text-align:center;margin-bottom:10px;box-shadow:var(--sh)}
.done-ic{width:62px;height:62px;border-radius:50%;background:#E8F8EE;border:2px solid #25D366;display:flex;align-items:center;justify-content:center;margin:0 auto 13px}

/* ADMIN */
#pgAdmin{background:var(--off);overflow-y:auto;-webkit-overflow-scrolling:touch}
.adm-body{padding:13px 12px 40px}
.atabs{display:flex;gap:3px;background:var(--wh);border:1px solid var(--bd);border-radius:50px;padding:4px;margin-bottom:15px;box-shadow:var(--sh)}
.atab{flex:1;padding:8px 6px;border-radius:50px;border:none;background:transparent;font-family:var(--font);font-size:11px;font-weight:700;color:var(--mut);cursor:pointer;transition:all .14s;white-space:nowrap}
.atab.on{background:var(--bk);color:var(--wh)}
.apanel{display:none}
.apanel.on{display:block}
.acard{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:9px;box-shadow:var(--sh)}
.acard-h{font-size:16px;font-weight:800;margin-bottom:2px}
.acard-s{font-size:11.5px;color:var(--mut);margin-bottom:12px;font-weight:500}
.qstats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px}
.stc{background:var(--off);border:1px solid var(--bd);border-radius:var(--rsm);padding:11px 8px;text-align:center}
.stv{font-size:26px;font-weight:800;line-height:1}
.stl{font-size:9px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
/* accordion */
.acc{border:1px solid var(--bd);border-radius:var(--rsm);margin-bottom:5px;overflow:hidden}
.acc-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--off);cursor:pointer;font-size:13px;font-weight:700;transition:background .12s}
.acc-hd:hover{background:#EEEEEE}
.acc-arr{transition:transform .18s;color:var(--mut);display:flex;align-items:center}
.acc-arr.op{transform:rotate(180deg)}
.acc-body{display:none;padding:9px 11px;border-top:1px solid var(--bd)}
.acc-body.op{display:block}
/* prato item */
.pi{display:flex;align-items:center;gap:7px;padding:8px 9px;background:var(--off);border:1px solid var(--bd);border-radius:7px;margin-bottom:4px}
.pi-inp{flex:1;background:transparent;border:none;font-family:var(--font);font-size:13px;font-weight:600;outline:none;color:var(--bk)}
.pi-photo{width:34px;height:34px;border-radius:6px;object-fit:cover;border:1px solid var(--bd);flex-shrink:0;cursor:pointer}
.pi-ph{width:34px;height:34px;border-radius:6px;background:var(--bd);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#bbb}
/* pedido */
.ped-row{padding:10px 12px;background:var(--off);border:1px solid var(--bd);border-radius:var(--rsm);margin-bottom:4px;cursor:pointer;transition:all .13s}
.ped-row:hover{border-color:#bbb;background:var(--wh)}
.ped-det{display:none;padding:8px 12px;background:var(--wh);border:1px solid var(--bd);border-top:none;border-radius:0 0 var(--rsm) var(--rsm);margin-top:-4px;margin-bottom:4px}
.ped-det.op{display:block}
.set-hd{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:5px;padding:0 2px}
/* user card */
.uc{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--off);border:1px solid var(--bd);border-radius:var(--rsm);margin-bottom:4px}
/* btns */
.btn{background:var(--off);border:1.5px solid var(--bd);border-radius:var(--rsm);color:var(--bk);padding:7px 12px;font-family:var(--font);font-size:11.5px;font-weight:700;cursor:pointer;transition:all .14s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{border-color:#aaa}
.btn-blk{background:var(--bk);border-color:var(--bk);color:var(--wh)}
.btn-blk:hover{background:#222}
.btn-red{background:rgba(200,40,40,.06);border-color:rgba(200,40,40,.18);color:#c02828}
.btn-red:hover{background:rgba(200,40,40,.12)}
.btn-sm{padding:4px 9px;font-size:10.5px}
.inp-f{width:100%;padding:11px 13px;background:var(--off);border:1.5px solid var(--bd);border-radius:var(--rsm);font-size:14px;font-family:var(--font);font-weight:500;color:var(--bk);outline:none;transition:border-color .15s;margin-bottom:8px}
.inp-f:focus{border-color:var(--bk);background:var(--wh)}

/* MODAL */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .18s}
.ovl.op{opacity:1;pointer-events:all}
.modal{background:var(--wh);border-radius:var(--r);width:min(380px,100%);padding:22px 17px 17px;box-shadow:0 24px 64px rgba(0,0,0,.16);transform:translateY(18px) scale(.96);transition:transform .2s}
.ovl.op .modal{transform:none}
.modal-h{font-size:17px;font-weight:800;margin-bottom:3px}
.modal-s{font-size:12px;color:var(--mut);margin-bottom:14px;font-weight:500}
.modal-err{color:#c02828;font-size:12px;font-weight:600;margin-bottom:8px;display:none}
.modal-err.on{display:block}
.modal-acts{display:flex;gap:7px;margin-top:12px}
.m-cancel{flex:1;height:44px;background:var(--off);border:1.5px solid var(--bd);border-radius:var(--rsm);font-size:13px;font-weight:700;color:var(--mut);cursor:pointer;font-family:var(--font);transition:all .14s}
.m-cancel:hover{color:var(--bk)}
.m-ok{flex:2;height:44px;background:var(--bk);border:none;border-radius:var(--rsm);font-size:13px;font-weight:700;color:var(--wh);cursor:pointer;font-family:var(--font);transition:background .14s}
.m-ok:hover{background:#222}
.m-ok.danger{background:#c02828}

/* TOAST */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);padding:10px 20px;border-radius:50px;font-size:12.5px;font-weight:700;z-index:9999;transition:transform .2s;pointer-events:none;max-width:88vw;text-align:center;white-space:nowrap;box-shadow:var(--sh2)}
.toast.ok{background:var(--bk);color:var(--wh)}
.toast.err{background:#c02828;color:#fff}
.toast.show{transform:translateX(-50%) translateY(0)}
.cfp{position:fixed;pointer-events:none;z-index:9998;animation:cf linear forwards}
@keyframes cf{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(540deg);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

@media(max-width:380px){.agrid{grid-template-columns:1fr}.qstats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script>
// ── DADOS ──────────────────────────────────────────────────────────────────────
const PK = 'gld_p3';
const DK = 'gld_d3';
const DIAS = ['Segunda-feira','Terca-feira','Quarta-feira','Quinta-feira','Sexta-feira'];
const SETORES = [
  'Gerencia','Adm. Administrativo','RH','Financeiro','Marketing',
  'Operacoes','Atendimento SAC','Seguranca','Portaria/Recepcao',
  'Manutencao','TI','Servicos Gerais','Estacionamento','Almoxarifado'
];

let DB = null, PROF = null, SEL = {}, _gmoCB = null, _selSetor = null;

function wk(){
  var d=new Date; d.setHours(0,0,0,0); d.setDate(d.getDate()-(d.getDay()||7)+1);
  return d.toISOString().split('T')[0];
}
function wkStr(){
  var d=new Date; d.setHours(0,0,0,0);
  var m=new Date(d); m.setDate(d.getDate()-(d.getDay()||7)+1);
  var f=new Date(m); f.setDate(m.getDate()+4);
  function fmt(x){return x.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});}
  return fmt(m)+' a '+fmt(f);
}
function loadDB(){
  try{var r=localStorage.getItem(DK);if(r)return JSON.parse(r);}catch(e){}
  return{
    cardapio:{
      'Segunda-feira':{pratos:['Picadinho com Batatas','Frango Assado','Peixe Grelhado','Salada Verde'],fotos:[]},
      'Terca-feira':  {pratos:['Camaroada','Escondidinho de Carne','File de Frango','Salada de Maionese'],fotos:[]},
      'Quarta-feira': {pratos:['Frango ao Molho','Figado Acebolado','Bisteca Suina','Pure de Batatas'],fotos:[]},
      'Quinta-feira': {pratos:['Carne Assada','Frango na Brasa','Peixe ao Molho','Salada de Legumes'],fotos:[]},
      'Sexta-feira':  {pratos:['Feijoada','Frango Grelhado','Omelete','Salada Mista'],fotos:[]}
    },
    waPhone:'',pedidos:{},admPwd:'golden2025',funcionarios:[]
  };
}
function saveDB(){try{localStorage.setItem(DK,JSON.stringify(DB));}catch(e){}}
function loadProf(){try{var r=localStorage.getItem(PK);if(r)return JSON.parse(r);}catch(e){}return null;}

// ── BOOT ───────────────────────────────────────────────────────────────────────
function boot(){
  DB=loadDB(); PROF=loadProf();
  buildAgrid();
  if(location.search.indexOf('admin')>=0){
    setTimeout(function(){hideSplash();showAdm();},800);
    return;
  }
  setTimeout(function(){
    hideSplash();
    if(!PROF)showPage('pgSetup');
    else showUser();
  },1200);
}
function hideSplash(){
  var s=document.getElementById('pgSplash');
  s.classList.add('out');
  setTimeout(function(){s.style.display='none';},600);
}
function showPage(id){
  document.querySelectorAll('.pg.on').forEach(function(p){p.classList.remove('on');});
  var el=document.getElementById(id);
  if(el){el.classList.add('on');window.scrollTo(0,0);}
}

// ── SETUP ──────────────────────────────────────────────────────────────────────
function buildAgrid(){
  var g=document.getElementById('agrid'); if(!g)return;
  g.innerHTML=SETORES.map(function(s){
    var k=s.replace(/[^a-z0-9]/gi,'_');
    return '<div class="acard" id="ac_'+k+'" onclick="selArea(\''+s.replace(/'/g,'&#39;')+'\')">'
      +'<div class="acard-nome">'+s+'</div></div>';
  }).join('');
}
function selArea(s){
  _selSetor=s;
  document.querySelectorAll('.acard').forEach(function(c){c.classList.remove('sel');});
  var k=s.replace(/[^a-z0-9]/gi,'_');
  var el=document.getElementById('ac_'+k);
  if(el)el.classList.add('sel');
}
function salvarPerfil(){
  var nomeC=document.getElementById('inNome').value.trim();
  var err=document.getElementById('setupErr');
  if(!nomeC||!_selSetor){err.classList.add('on');return;}
  err.classList.remove('on');
  var partes=nomeC.split(' ');
  var nome=partes[0]||nomeC;
  var sobre=partes.slice(1).join(' ')||'';
  PROF={nome:nome,sobrenome:sobre,setor:_selSetor};
  try{localStorage.setItem(PK,JSON.stringify(PROF));}catch(e){}
  if(!DB.funcionarios)DB.funcionarios=[];
  var fn={nome:nomeC,setor:_selSetor};
  var exists=DB.funcionarios.some(function(f){return f.nome.toLowerCase()===fn.nome.toLowerCase();});
  if(!exists){DB.funcionarios.push(fn);saveDB();}
  showUser();
}

// ── USER ───────────────────────────────────────────────────────────────────────
function showUser(){
  showPage('pgUser');
  var nomeC=PROF.nome+' '+PROF.sobrenome;
  document.getElementById('greetName').textContent='Ola, '+PROF.nome+'!';
  document.getElementById('greetArea').textContent=PROF.setor;
  document.getElementById('wkChip').textContent='Semana '+wkStr();
  SEL={};
  var wkey=wk();
  var pedidos=DB.pedidos||{};
  var meu=null;
  Object.values(pedidos).forEach(function(p){
    if(p.wk===wkey&&p.nome&&p.nome.toLowerCase()===nomeC.toLowerCase())meu=p;
  });
  if(meu){
    document.getElementById('daysList').innerHTML='';
    document.getElementById('donebox').style.display='block';
    document.getElementById('sendFt').style.display='none';
    return;
  }
  document.getElementById('donebox').style.display='none';
  document.getElementById('sendFt').style.display='';
  renderDays();
}

function renderDays(){
  var el=document.getElementById('daysList'); if(!el)return;
  var dias=Object.keys(DB.cardapio||{});
  var html='';
  dias.forEach(function(dia){
    var info=DB.cardapio[dia]||{};
    var pratos=info.pratos||[];
    var fotos=info.fotos||[];
    var selLbl=SEL[dia]?'Selecionado':'Escolha um prato';
    var selCls=SEL[dia]?'done':'';
    html+='<div class="dsec">'
      +'<div class="dsec-hd"><div class="dsec-day">'+dia+'</div>'
      +'<div class="dsec-lbl '+selCls+'" id="lbl_'+esc(dia)+'">'+selLbl+'</div></div>'
      +'<div class="dish-list">';
    pratos.forEach(function(p,i){
      var foto=fotos[i]||'';
      var sel=SEL[dia]===p;
      var selC=sel?'sel':'';
      var sd=esc(dia), sp=esc(p);
      html+='<div class="dish-it '+selC+'" onclick="selDish(\''+sd+'\',\''+sp+'\')">'
        +(foto
          ?'<img class="di-photo" src="'+foto+'" alt="'+p+'" onerror="this.style.display=\'none\'">'
          :'<div class="di-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="13" height="13"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>')
        +'<div class="di-dot"><div class="di-dot-in"></div></div>'
        +'<div class="di-name">'+p+'</div>'
        +'</div>';
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
  updInfo();
}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function selDish(dia,prato){
  if(SEL[dia]===prato)delete SEL[dia]; else SEL[dia]=prato;
  renderDays();
}
function updInfo(){
  var sel=Object.values(SEL).filter(Boolean).length;
  var total=Object.keys(DB.cardapio||{}).length;
  var el=document.getElementById('sendInfo');
  if(el)el.innerHTML='<strong>'+sel+' de '+total+'</strong> dias selecionados';
}

function enviarWA(){
  var nomeC=PROF.nome+' '+PROF.sobrenome;
  var dias=Object.keys(DB.cardapio||{});
  var NL=String.fromCharCode(10);
  var msg='*Pedido de almoco - '+nomeC+'*'+NL;
  msg+='Setor: '+PROF.setor+NL;
  msg+='Semana: '+wkStr()+NL+NL;
  dias.forEach(function(dia){
    msg+=dia+': '+(SEL[dia]||'-')+NL;
  });
  var wkey=wk();
  var key=nomeC.toLowerCase().replace(/\s/g,'_')+'__'+wkey;
  if(!DB.pedidos)DB.pedidos={};
  var diasObj={};
  Object.assign(diasObj,SEL);
  DB.pedidos[key]={nome:nomeC,setor:PROF.setor,wk:wkey,dias:diasObj,ts:Date.now()};
  saveDB();
  var phone=(DB.waPhone||'').replace(/\D/g,'');
  var url=phone
    ?'https://wa.me/'+phone+'?text='+encodeURIComponent(msg)
    :'https://wa.me/?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
  document.getElementById('daysList').innerHTML='';
  document.getElementById('donebox').style.display='block';
  document.getElementById('sendFt').style.display='none';
  confetti();
}

// ── ADMIN ──────────────────────────────────────────────────────────────────────
function abrirAdm(){
  document.getElementById('admPwd').value='';
  document.getElementById('admErr').classList.remove('on');
  document.getElementById('admOvl').classList.add('op');
  setTimeout(function(){document.getElementById('admPwd').focus();},200);
}
function confirmarAdm(){
  var pwd=document.getElementById('admPwd').value;
  if(pwd===(DB.admPwd||'golden2025')){
    fecharOvl('admOvl'); showAdm();
  }else{
    document.getElementById('admErr').classList.add('on');
    document.getElementById('admPwd').value='';
    document.getElementById('admPwd').focus();
  }
}
function sairAdm(){if(PROF)showUser();else showPage('pgSetup');}
function showAdm(){
  showPage('pgAdmin');
  renderPeds(); renderCard(); renderCfg();
}
function aTab(tab){
  ['ped','card','cfg'].forEach(function(t){
    document.getElementById('at_'+t).classList.toggle('on',t===tab);
    document.getElementById('ap_'+t).classList.toggle('on',t===tab);
  });
}

// PEDIDOS
function renderPeds(){
  var c=document.getElementById('ap_ped'); if(!c)return;
  var wkey=wk();
  var todos=Object.values(DB.pedidos||{}).filter(function(p){return p.wk===wkey;});
  var tfn=(DB.funcionarios||[]).length;
  var pct=tfn?Math.round(todos.length/tfn*100):0;
  var por={};
  todos.forEach(function(p){var s=p.setor||'Outros';if(!por[s])por[s]=[];por[s].push(p);});
  var pendentes=(DB.funcionarios||[]).filter(function(f){
    return !todos.some(function(p){return p.nome.toLowerCase()===f.nome.toLowerCase();});
  });
  var html='<div class="qstats">'
    +'<div class="stc"><div class="stv">'+todos.length+'</div><div class="stl">Pedidos</div></div>'
    +'<div class="stc"><div class="stv">'+tfn+'</div><div class="stl">Funcionarios</div></div>'
    +'<div class="stc"><div class="stv">'+pct+'%</div><div class="stl">Feito</div></div>'
    +'</div>'
    +'<div class="acard"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:11px">'
    +'<div><div class="acard-h">Pedidos</div><div style="font-size:11.5px;color:var(--mut)">'+wkStr()+'</div></div>'
    +'<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="exportar()">Exportar</button>'
    +'<button class="btn btn-sm btn-red" onclick="limpar()">Limpar</button></div></div>';
  if(!todos.length){
    html+='<div style="text-align:center;padding:24px;color:var(--mut);font-size:13px">Nenhum pedido esta semana</div>';
  } else {
    Object.entries(por).forEach(function(entry){
      var setor=entry[0], peds=entry[1];
      html+='<div style="margin-bottom:11px"><div class="set-hd">'+setor+' ('+peds.length+')</div>';
      peds.forEach(function(p,i){
        var uid='pd_'+i+'_'+(p.nome||i).replace(/\W/g,'');
        html+='<div class="ped-row" onclick="togglePed(\''+uid+'\')"><div style="display:flex;align-items:center;justify-content:space-between">'
          +'<div style="font-size:13.5px;font-weight:700">'+p.nome+'</div>'
          +'<div style="font-size:11px;color:var(--mut)">'+new Date(p.ts||0).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'</div>'
          +'</div></div>'
          +'<div class="ped-det" id="'+uid+'">';
        DIAS.forEach(function(d){
          if(p.dias&&p.dias[d]){
            html+='<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--bd)">'
              +'<div style="font-size:10.5px;font-weight:700;color:var(--mut);width:78px;flex-shrink:0">'+d.split('-')[0]+'</div>'
              +'<div style="font-size:12.5px;font-weight:600">'+p.dias[d]+'</div></div>';
          }
        });
        html+='</div>';
      });
      html+='</div>';
    });
  }
  if(pendentes.length){
    html+='<div style="margin-top:12px;padding-top:11px;border-top:1px solid var(--bd)">'
      +'<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:7px">Pendentes ('+pendentes.length+')</div>';
    pendentes.forEach(function(f){
      html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 11px;background:var(--off);border:1px solid var(--bd);border-radius:8px;margin-bottom:4px">'
        +'<div><div style="font-size:13px;font-weight:700">'+f.nome+'</div><div style="font-size:11px;color:var(--mut)">'+f.setor+'</div></div></div>';
    });
    html+='</div>';
  }
  html+='</div>';
  c.innerHTML=html;
}
function togglePed(uid){var d=document.getElementById(uid);if(d)d.classList.toggle('op');}
function exportar(){
  var wkey=wk();
  var todos=Object.values(DB.pedidos||{}).filter(function(p){return p.wk===wkey;});
  if(!todos.length){toast('Nenhum pedido','err');return;}
  var NL=String.fromCharCode(10);
  var txt='GOLDEN CALHAU - '+wkStr()+NL+'='.repeat(36)+NL+NL;
  todos.forEach(function(p){
    txt+=p.nome+' ('+p.setor+')'+NL;
    DIAS.forEach(function(d){if(p.dias&&p.dias[d])txt+='  '+d+': '+p.dias[d]+NL;});
    txt+=NL;
  });
  var a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(txt);
  a.download='pedidos_'+wkey+'.txt';a.click();
}
function limpar(){
  gmoOpen({title:'Limpar semana',sub:'Remove todos os pedidos desta semana.',confirm:'Limpar',danger:true,
    onSubmit:function(){
      var wkey=wk();
      Object.keys(DB.pedidos||{}).forEach(function(k){if(k.indexOf(wkey)>=0)delete DB.pedidos[k];});
      saveDB();renderPeds();toast('Pedidos removidos');
    }
  });
}

// CARDAPIO
function renderCard(){
  var c=document.getElementById('ap_card'); if(!c)return;
  var html='<div class="acard"><div class="acard-h">Editar Cardapio</div>'
    +'<div class="acard-s">Toque no dia para expandir</div>'
    +'<div id="accords"></div></div>';
  c.innerHTML=html; buildAccords();
}
function buildAccords(){
  var c=document.getElementById('accords'); if(!c)return;
  var html='';
  Object.keys(DB.cardapio||{}).forEach(function(dia){
    var info=DB.cardapio[dia]||{};
    var k=dia.replace(/[^a-z0-9]/gi,'_');
    html+='<div class="acc"><div class="acc-hd" onclick="toggleAcc(\''+k+'\')">'
      +'<span>'+dia+' <span style="font-size:11px;font-weight:500;color:var(--mut)">('+((info.pratos||[]).length)+')</span></span>'
      +'<span class="acc-arr" id="accarr_'+k+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="14" height="14"><polyline points="6 9 12 15 18 9"/></svg></span>'
      +'</div><div class="acc-body" id="accbody_'+k+'">'
      +'<div id="plist_'+k+'">'
      +(info.pratos||[]).map(function(p,i){return buildPI(dia,p,i,(info.fotos||[])[i]||'');}).join('')
      +'</div>'
      +'<button class="btn" style="margin-top:7px;font-size:11px" onclick="addPrato(\''+dia.replace(/'/g,"\\'")+'\')">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="12" height="12"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
      +' Adicionar</button>'
      +'</div></div>';
  });
  c.innerHTML=html;
}
function buildPI(dia,nome,i,foto){
  var sd=dia.replace(/'/g,"\\'");
  return '<div class="pi">'
    +(foto
      ?'<img class="pi-photo" src="'+foto+'" onclick="fotoFn(\''+sd+'\','+i+')">'
      :'<div class="pi-ph" onclick="fotoFn(\''+sd+'\','+i+')">'
        +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="12" height="12"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
        +'</div>')
    +'<input class="pi-inp" type="text" value="'+nome.replace(/"/g,'&quot;')+'" onchange="editPrato(\''+sd+'\','+i+',this.value)">'
    +'<button class="btn btn-sm btn-red" style="padding:4px 8px" onclick="remPrato(\''+sd+'\','+i+')">'
    +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
    +'</button></div>';
}
function toggleAcc(k){
  document.getElementById('accbody_'+k)&&document.getElementById('accbody_'+k).classList.toggle('op');
  document.getElementById('accarr_'+k)&&document.getElementById('accarr_'+k).classList.toggle('op');
}
function editPrato(dia,i,v){if(DB.cardapio[dia]){DB.cardapio[dia].pratos[i]=v;saveDB();}}
function remPrato(dia,i){
  if(!DB.cardapio[dia])return;
  DB.cardapio[dia].pratos.splice(i,1);
  if(DB.cardapio[dia].fotos)DB.cardapio[dia].fotos.splice(i,1);
  saveDB();buildAccords();toast('Removido');
}
function addPrato(dia){
  gmoOpen({title:'Adicionar prato',sub:dia,
    fields:[{id:'nome',label:'Nome do prato',placeholder:'Ex: Frango Grelhado',required:true}],
    confirm:'Adicionar',
    onSubmit:function(v){
      if(!v.nome||!v.nome.trim())return;
      if(!DB.cardapio[dia])return;
      DB.cardapio[dia].pratos.push(v.nome.trim());
      if(!DB.cardapio[dia].fotos)DB.cardapio[dia].fotos=[];
      DB.cardapio[dia].fotos.push('');
      saveDB();buildAccords();toast('Prato adicionado!');
    }
  });
}
function fotoFn(dia,i){
  var inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=function(e){
    var f=e.target.files[0]; if(!f)return;
    if(f.size>1500000){toast('Max 1.5MB','err');return;}
    var r=new FileReader();
    r.onload=function(ev){
      if(!DB.cardapio[dia])return;
      if(!DB.cardapio[dia].fotos)DB.cardapio[dia].fotos=[];
      DB.cardapio[dia].fotos[i]=ev.target.result;
      saveDB();buildAccords();toast('Foto salva!');
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

// CONFIG
function renderCfg(){
  var c=document.getElementById('ap_cfg'); if(!c)return;
  var fns=DB.funcionarios||[];
  var fnHtml=fns.length
    ?fns.map(function(f,i){
      return '<div class="uc">'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:700">'+f.nome+'</div>'
        +'<div style="font-size:11px;color:var(--mut)">'+f.setor+'</div></div>'
        +'<button class="btn btn-sm btn-red" onclick="remFn('+i+')">'
        +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
        +'</button></div>';
    }).join('')
    :'<div style="text-align:center;padding:18px;color:var(--mut);font-size:13px">Nenhum funcionario cadastrado</div>';
  c.innerHTML=
    '<div class="acard"><div class="acard-h">WhatsApp</div>'
    +'<div class="acard-s">Numero do grupo (com DDI+DDD) ou deixe vazio</div>'
    +'<input class="inp-f" id="waInp" type="tel" placeholder="Ex: 5598999991234" value="'+(DB.waPhone||'')+'">'
    +'<button class="btn btn-blk" onclick="saveCfg()">Salvar</button></div>'
    +'<div class="acard"><div class="acard-h">Senha admin</div>'
    +'<div class="acard-s">Senha atual: '+(DB.admPwd||'golden2025')+'</div>'
    +'<input class="inp-f" id="pwdInp" type="text" placeholder="Nova senha">'
    +'<button class="btn btn-blk" onclick="savePwd()">Alterar senha</button></div>'
    +'<div class="acard"><div class="acard-h">Equipe</div>'
    +'<div class="acard-s">'+fns.length+' funcionarios cadastrados</div>'
    +'<div>'+fnHtml+'</div></div>';
}
function saveCfg(){
  var v=document.getElementById('waInp');
  if(v){DB.waPhone=v.value.replace(/\D/g,'');saveDB();toast('Salvo!');}
}
function savePwd(){
  var v=document.getElementById('pwdInp');
  var pwd=v?v.value.trim():'';
  if(!pwd){toast('Senha vazia','err');return;}
  DB.admPwd=pwd;saveDB();toast('Senha alterada!');renderCfg();
}
function remFn(i){
  DB.funcionarios.splice(i,1);saveDB();renderCfg();toast('Removido');
}

// ── MODAL GENERICO ─────────────────────────────────────────────────────────────
function gmoOpen(opts){
  _gmoCB=opts.onSubmit||null;
  document.getElementById('gmoH').textContent=opts.title||'';
  document.getElementById('gmoS').textContent=opts.sub||'';
  document.getElementById('gmoErr').className='modal-err';
  var btn=document.getElementById('gmoOk');
  btn.textContent=opts.confirm||'Confirmar';
  btn.className='m-ok'+(opts.danger?' danger':'');
  var ff=document.getElementById('gmoFlds');
  ff.innerHTML=(opts.fields||[]).map(function(f){
    return '<div class="field"><label class="lbl">'+f.label+'</label>'
      +'<input id="gf_'+f.id+'" type="text" placeholder="'+(f.placeholder||'')+'" value="'+(f.value||'')+'"'
      +' class="inp-f" style="margin-bottom:0"'+(f.required?' required':'')+' autocomplete="off">'
      +'</div>';
  }).join('');
  document.getElementById('gmoOvl').classList.add('op');
  setTimeout(function(){
    var fi=ff.querySelector('input');if(fi)fi.focus();
    ff.querySelectorAll('input').forEach(function(inp){
      inp.addEventListener('keydown',function(e){if(e.key==='Enter')gmoSubmit();if(e.key==='Escape')gmoCancel();});
    });
  },160);
}
function gmoCancel(){document.getElementById('gmoOvl').classList.remove('op');_gmoCB=null;}
function gmoSubmit(){
  var ff=document.getElementById('gmoFlds');
  var vals={};var ok=true;
  ff.querySelectorAll('input').forEach(function(inp){
    var id=inp.id.replace('gf_','');vals[id]=inp.value.trim();
    if(inp.required&&!inp.value.trim()){ok=false;inp.style.borderColor='#c02828';inp.focus();}
  });
  if(!ok){var e=document.getElementById('gmoErr');e.textContent='Preencha os campos';e.className='modal-err on';return;}
  document.getElementById('gmoOvl').classList.remove('op');
  if(_gmoCB){var cb=_gmoCB;_gmoCB=null;cb(vals);}
}
function fecharOvl(id){var el=document.getElementById(id);if(el)el.classList.remove('op');}

// ── UTILS ──────────────────────────────────────────────────────────────────────
function toast(msg,type){
  type=type||'ok';
  var e=document.getElementById('toast');
  e.className='toast '+type;e.textContent=msg;
  void e.offsetWidth;e.classList.add('show');
  clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show');},2500);
}
function confetti(){
  var c=['#C8A020','#0A0A0A','#888'];
  for(var i=0;i<18;i++){
    var el=document.createElement('div');el.className='cfp';
    var s=Math.random()*8+5;
    el.style.cssText='width:'+s+'px;height:'+(s+2)+'px;background:'+c[i%3]+';left:'+Math.floor(Math.random()*100)+'vw;top:-10px;border-radius:2px;animation-duration:'+(Math.random()*2+2)+'s;animation-delay:'+(Math.random()*.4)+'s';
    document.body.appendChild(el);setTimeout(function(){el.remove();},3500);
  }
}
function resetPedido(){
  if(!PROF)return;
  var nomeC=PROF.nome+' '+PROF.sobrenome;
  var wkey=wk();
  Object.keys(DB.pedidos||{}).forEach(function(k){
    var p=DB.pedidos[k];
    if(p&&p.wk===wkey&&p.nome&&p.nome.toLowerCase()===nomeC.toLowerCase())delete DB.pedidos[k];
  });
  saveDB(); SEL={}; showUser();
}
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});
}
boot();
