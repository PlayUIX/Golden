<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Golden Cardápio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #D4AF37;
            --white: #FFFFFF;
            --black: #000000;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .hidden { display: none !important; }
        
        /* TELA DE LOADING */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--black);
            z-index: 10000;
        }
        
        .slogan {
            position: absolute;
            top: 30%;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInOut 2s ease-in-out 1s forwards;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }        }
        
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            animation: float 4s ease-in-out infinite;
        }
        
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        /* TELA DE CADASTRO */
        #tela-cadastro {
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        h1 {
            color: var(--gold);
            margin-bottom: 40px;
            font-size: 32px;
            font-weight: 700;
        }
        
        input, select {
            width: 100%;
            padding: 18px;
            margin-bottom: 25px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: var(--white);
            font-size: 16px;
            border-radius: 8px;
        }
        
        button {            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--gold), #AA8C2C);
            border: none;
            color: var(--black);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.02);
        }
        
        /* SELEÇÃO DE DIAS */
        .dias-grid {
            display: grid;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .dia-btn {
            padding: 25px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: var(--white);
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .dia-btn.selected {
            background: linear-gradient(135deg, var(--gold), #AA8C2C);
            color: var(--black);
            border-color: var(--gold);
        }
        
        /* SELEÇÃO DE PRATOS */
        .pratos-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .prato-card {
            padding: 30px;
            background: #1a1a1a;            border: 1px solid #333;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .prato-icon {
            font-size: 40px;
            color: var(--gold);
        }
        
        .prato-nome {
            font-size: 18px;
            font-weight: 600;
        }
        
        .prato-card.selected {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(170, 140, 44, 0.2));
            border-color: var(--gold);
            border-left: 4px solid var(--gold);
        }
        
        /* TELA FINAL */
        #tela-final {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }
        
        .check-icon {
            font-size: 120px;
            color: var(--gold);
            margin-bottom: 30px;
        }
        
        .final-title {
            font-size: 36px;
            color: var(--gold);
            margin-bottom: 20px;
        }
        
        .final-text {
            font-size: 18px;            color: #888;
            margin-bottom: 30px;
        }
        
        .btn-whatsapp {
            background: #25D366;
            color: white;
        }
        
        @media (max-width: 480px) {
            .prato-nome { font-size: 16px; }
            .prato-icon { font-size: 32px; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="slogan">É fácil ser feliz aqui</div>
        <div class="logo-container">
            <img src="./logo.png" alt="Golden" class="logo-img" onerror="this.style.display='none'">
        </div>
    </div>

    <!-- Tela de Cadastro -->
    <section id="tela-cadastro" class="hidden">
        <h1>GOLDEN SHOPPING</h1>
        <input type="text" id="nome" placeholder="Nome e sobrenome">
        <select id="cargo">
            <option value="">Selecione seu cargo/setor</option>
            <option value="Administrativo">Administrativo</option>
            <option value="Financeiro">Financeiro</option>
            <option value="Recursos Humanos">Recursos Humanos</option>
            <option value="TI">Tecnologia da Informação</option>
            <option value="Segurança">Segurança</option>
            <option value="Limpeza">Limpeza</option>
            <option value="Manutenção">Manutenção</option>
            <option value="Atendimento">Atendimento</option>
            <option value="Operacional">Operacional</option>
            <option value="Gerência">Gerência</option>
            <option value="Outro">Outro</option>
        </select>
        <button onclick="continuar()">Continuar</button>
    </section>

    <!-- Seleção de Dias -->
    <section id="tela-dias" class="hidden" style="padding: 40px 20px; max-width: 500px; margin: 0 auto;">
        <h2 style="color: var(--gold); margin-bottom: 30px;">Selecione os dias</h2>
        <div class="dias-grid">            <button class="dia-btn" onclick="selecionarDia(this, 0)">Segunda-Feira</button>
            <button class="dia-btn" onclick="selecionarDia(this, 1)">Terça-Feira</button>
            <button class="dia-btn" onclick="selecionarDia(this, 2)">Quarta-Feira</button>
            <button class="dia-btn" onclick="selecionarDia(this, 3)">Quinta-Feira</button>
            <button class="dia-btn" onclick="selecionarDia(this, 4)">Sexta-Feira</button>
        </div>
    </section>

    <!-- Seleção de Pratos -->
    <section id="tela-pratos" class="hidden" style="padding: 40px 20px; max-width: 500px; margin: 0 auto;">
        <h2 id="dia-titulo" style="color: var(--gold); margin-bottom: 30px;">SEGUNDA-FEIRA</h2>
        <div class="pratos-grid" id="pratos-lista"></div>
        <button onclick="confirmarPrato()" style="margin-top: 30px;">Confirmar e Continuar</button>
    </section>

    <!-- Tela Final -->
    <section id="tela-final" class="hidden">
        <div class="check-icon"><i class="fas fa-check-circle"></i></div>
        <h2 class="final-title">CARDÁPIO ENVIADO!</h2>
        <p class="final-text">Você já fez seu pedido da semana.<br>Aguarde o próximo ciclo.</p>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">📱 Enviar ao Grupo</button>
    </section>

    <script>
        // Configurações Globais
        const API_URL = 'https://golden-api-backend.herokuapp.com/api';
        let userData = { nome: '', cargo: '' };
        let pedidosSemana = {};
        let diaAtual = null;

        // Verifica se usuário já existe
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                
                const savedUser = localStorage.getItem('golden_user_v2');
                if (savedUser && JSON.parse(savedUser).hasPedido !== false) {
                    mostrarTelaFinal();
                } else {
                    document.getElementById('tela-cadastro').classList.remove('hidden');
                }
            }, 3000);
        });

        function continuar() {
            const nome = document.getElementById('nome').value.trim();
            const cargo = document.getElementById('cargo').value;
            
            if (!nome || !cargo) {
                alert('Preencha todos os campos!');                return;
            }
            
            userData = { nome, cargo };
            localStorage.setItem('golden_user_v2', JSON.stringify({ ...userData, hasPedido: false }));
            document.getElementById('tela-cadastro').classList.add('hidden');
            document.getElementById('tela-dias').classList.remove('hidden');
        }

        function selecionarDia(btn, index) {
            document.querySelectorAll('.dia-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            diaAtual = index;
            setTimeout(carregarPratos, 300);
        }

        const cardapio = {
            0: ['Frango Grelhado', 'Bife Acebolado', 'Peixe', 'Espaguete', 'Salada'],
            1: ['Carne Assada', 'Frango Assado', 'Feijoada', 'Lasanha', 'Esfiha'],
            2: ['Pizza', 'Hamburguer', 'Macarrão', 'Sanduíche', 'Tacos'],
            3: ['Filé Mignon', 'Salmão', 'Arroz Carreteiro', 'Wrap', 'Frango Empanado'],
            4: ['X-Burger', 'Batata Frita', 'Misto Quente', 'Cachorro Quente', 'Pizza Especial']
        };

        function carregarPratos() {
            const lista = document.getElementById('pratos-lista');
            lista.innerHTML = '';
            
            const pratos = cardapio[diaAtual] || [];
            const nomesIcones = {
                Frango: 'fa-drumstick-bite', Carne: 'fa-bacon', Peixe: 'fa-fish',
                Espaguete: 'fa-utensils', Salada: 'fa-leaf', Pizza: 'fa-pizza-slice',
                Hamburguer: 'fa-hamburger', Macarrão: 'fa-utensils', Sanduíche: 'fa-bread-slice'
            };

            pratos.forEach(prato => {
                const iconClass = Object.keys(nomesIcones).find(k => prato.includes(k)) || 'fa-utensils';
                const iconHTML = `<i class="fas ${iconClass} prato-icon"></i>`;
                const pratoHTML = `<span class="prato-nome">${prato}</span>`;
                
                const card = document.createElement('div');
                card.className = 'prato-card';
                card.innerHTML = `${iconHTML} ${pratoHTML}`;
                card.onclick = () => selecionarPrato(card, prato);
                lista.appendChild(card);
            });
            
            document.getElementById('tela-dias').classList.add('hidden');
            document.getElementById('tela-pratos').classList.remove('hidden');
        }
        function selecionarPrato(card, nome) {
            document.querySelectorAll('.prato-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            falarPrato(nome);
            setTimeout(confirmarPrato, 800);
        }

        function falarPrato(nome) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(nome);
                utterance.lang = 'pt-BR';
                speechSynthesis.speak(utterance);
            }
        }

        function confirmarPrato() {
            const diaNomes = ['Segunda-Feira', 'Terça-Feira', 'Quarta-Feira', 'Quinta-Feira', 'Sexta-Feira'];
            const pratoSelecionado = document.querySelector('.prato-card.selected')?.querySelector('.prato-nome').textContent;
            
            if (!pratoSelecionado) {
                alert('Selecione um prato!');
                return;
            }
            
            pedidosSemana[diaNomes[diaAtual]] = pratoSelecionado;
            
            if (Object.keys(pedidosSemana).length < 5) {
                diaAtual++;
                document.getElementById('tela-pratos').classList.add('hidden');
                document.getElementById('tela-dias').classList.remove('hidden');
            } else {
                finalizarPedido();
            }
        }

        function finalizarPedido() {
            localStorage.setItem('golden_user_v2', JSON.stringify({ ...userData, hasPedido: true }));
            localStorage.setItem('pedido_finalizado', JSON.stringify(pedidosSemana));
            document.getElementById('tela-pratos').classList.add('hidden');
            document.getElementById('tela-final').classList.remove('hidden');
        }

        function enviarWhatsApp() {
            const pedidos = JSON.parse(localStorage.getItem('pedido_finalizado'));
            let msg = '*GOLDEN CARDÁPIO* 🍽️\n\n';
            msg += `*Nome:* ${userData.nome}\n`;
            msg += `*Cargo:* ${userData.cargo}\n\n`;
            msg += '*PEDIDOS DA SEMANA:* \n';
                        for (const [dia, prato] of Object.entries(pedidos)) {
                msg += `▪️ ${dia}: ${prato}\n`;
            }
            
            msg += '\n✨ É fácil ser feliz aqui ✨';
            
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
        
        function mostrarTelaFinal() {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('tela-final').classList.remove('hidden');
        }
    </script>
</body>
</html>
