<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Golden Calhau — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#060402;
  display:flex;align-items:center;justify-content:center;
  font-family:'Montserrat',sans-serif;
  min-height:100vh;
}

/* FUNDO */
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 110% 55% at 50% -5%, rgba(180,130,20,.18) 0%, transparent 52%),
    radial-gradient(ellipse 70% 70% at 15% 105%, rgba(100,65,10,.2) 0%, transparent 50%),
    radial-gradient(ellipse 55% 55% at 88% 90%, rgba(70,45,8,.16) 0%, transparent 48%),
    linear-gradient(165deg, #110C04 0%, #060402 40%, #0C0804 100%);
}
.bg::after{
  content:'';position:absolute;inset:0;opacity:.11;
  background-image:
    repeating-linear-gradient(42deg,transparent 0,transparent 2px,rgba(212,175,55,.05) 2px,rgba(212,175,55,.05) 3px),
    repeating-linear-gradient(-42deg,transparent 0,transparent 8px,rgba(200,160,32,.03) 8px,rgba(200,160,32,.03) 9px);
}

/* spotlight */
.spotlight{
  position:fixed;top:-30%;left:50%;transform:translateX(-50%);
  width:900px;height:900px;border-radius:50%;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse,rgba(200,140,18,.2) 0%,transparent 65%);
  animation:spotPulse 5s ease-in-out infinite;
}
@keyframes spotPulse{0%,100%{opacity:.7}50%{opacity:1}}

/* colunas */
.col-l,.col-r{
  position:fixed;top:0;bottom:0;width:1px;z-index:2;pointer-events:none;
  background:linear-gradient(180deg,transparent 0%,rgba(212,175,55,.2) 15%,rgba(212,175,55,.2) 85%,transparent 100%);
}
.col-l{left:10%}.col-r{right:10%}

/* losangos nas colunas */
.col-gem{
  position:fixed;width:7px;height:7px;transform:rotate(45deg);
  background:rgba(212,175,55,.5);z-index:3;
}

/* partículas */
.ptcl{position:fixed;inset:0;z-index:2;overflow:hidden;pointer-events:none}
.p{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(255,215,0,.85),transparent 70%);
  animation:pfloat linear infinite;
}
@keyframes pfloat{
  0%{transform:translateY(0) translateX(0);opacity:0}
  8%{opacity:.8}88%{opacity:.3}
  100%{transform:translateY(-102vh) translateX(var(--dx));opacity:0}
}

/* WRAP */
.wrap{
  position:relative;z-index:10;
  width:min(350px,85vw);
  display:flex;flex-direction:column;align-items:center;
  animation:wrapIn .8s cubic-bezier(.4,0,.2,1) both;
}
@keyframes wrapIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* LOGO */
.logo-wrap{
  position:relative;
  width:148px;height:148px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:26px;
}

/* halo externo pulsante */
.halo-outer{
  position:absolute;inset:-22px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,.14) 0%,transparent 68%);
  animation:haloBig 4s ease-in-out infinite;
}
@keyframes haloBig{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.14);opacity:1}}

/* anel externo lento */
.ring-outer{
  position:absolute;inset:-10px;border-radius:50%;
  border:1px solid transparent;
  border-top:1px solid rgba(212,175,55,.3);
  border-right:1px solid rgba(212,175,55,.12);
  animation:spinCW 12s linear infinite;
}
/* anel interno reverso */
.ring-inner{
  position:absolute;inset:-4px;border-radius:50%;
  border:1px solid transparent;
  border-bottom:1px solid rgba(212,175,55,.22);
  border-left:1px solid rgba(212,175,55,.1);
  animation:spinCCW 8s linear infinite;
}
@keyframes spinCW{to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}

/* 4 pontos cardeais nos anéis */
.ring-dot{
  position:absolute;width:4px;height:4px;border-radius:50%;
  background:rgba(212,175,55,.6);
}

/* logo image */
.logo-img{
  width:120px;height:120px;object-fit:contain;
  position:relative;z-index:3;
  filter:
    drop-shadow(0 0 14px rgba(212,175,55,.65))
    drop-shadow(0 0 38px rgba(212,175,55,.3))
    drop-shadow(0 10px 28px rgba(0,0,0,.65));
  animation:logoFloat 6s ease-in-out infinite;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0) scale(1);filter:drop-shadow(0 0 14px rgba(212,175,55,.65)) drop-shadow(0 0 38px rgba(212,175,55,.3)) drop-shadow(0 10px 28px rgba(0,0,0,.65))}
  50%{transform:translateY(-8px) scale(1.03);filter:drop-shadow(0 0 28px rgba(255,215,0,.85)) drop-shadow(0 0 65px rgba(212,175,55,.42)) drop-shadow(0 14px 32px rgba(0,0,0,.65))}
}

/* TEXTO */
.brand-name{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;font-size:50px;
  letter-spacing:.05em;line-height:1;
  text-align:center;margin-bottom:8px;
}
.brand-name em{
  font-style:italic;font-weight:400;
  background:linear-gradient(180deg,#FFD700 0%,#D4AF37 40%,#C8A020 68%,#8B6820 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.brand-name span{color:rgba(240,222,155,.68);font-style:normal}

.gold-line{
  width:0;height:1px;margin:11px 0 9px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.55),transparent);
  animation:lineGrow .9s ease .5s forwards;
}
@keyframes lineGrow{to{width:52%}}

.brand-sub{
  font-family:'Montserrat',sans-serif;
  font-weight:200;font-size:8.5px;letter-spacing:.52em;
  text-transform:uppercase;color:rgba(212,175,55,.4);
  margin-bottom:40px;
}

/* INPUT */
.field{width:100%;position:relative;margin-bottom:6px}

.field-lbl{
  position:absolute;top:-10px;left:26px;
  font-size:7.5px;font-weight:400;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(212,175,55,.44);
}

.field-line{
  display:flex;align-items:center;
  border-bottom:1px solid rgba(212,175,55,.18);
  padding:15px 0 13px;position:relative;
  transition:border-color .3s;
}
.field-line:focus-within{border-bottom-color:rgba(212,175,55,.55)}
.field-line::after{
  content:'';position:absolute;bottom:-1px;left:50%;
  width:0;height:1.5px;background:#D4AF37;
  transform:translateX(-50%);
  transition:width .45s cubic-bezier(.4,0,.2,1);
}
.field-line:focus-within::after{width:100%}

.fi{font-size:13px;color:rgba(212,175,55,.36);margin-right:14px;transition:color .3s;line-height:1}
.field-line:focus-within .fi{color:rgba(212,175,55,.68)}

.field-line input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Montserrat',sans-serif;font-weight:300;font-size:15px;
  color:rgba(240,224,160,.88);caret-color:#D4AF37;letter-spacing:.04em;
}
.field-line input::placeholder{color:rgba(212,175,55,.26);font-size:13px;letter-spacing:.06em}

/* BOTÃO */
.btn{
  width:100%;height:52px;margin-top:30px;
  background:linear-gradient(90deg,
    #7A5E18 0%,#C8A020 20%,#EAC840 36%,
    #FFD700 50%,#EAC840 64%,#C8A020 80%,#7A5E18 100%
  );
  background-size:200% 100%;
  border:none;color:#0A0804;
  font-family:'Montserrat',sans-serif;
  font-size:10px;font-weight:500;letter-spacing:.46em;text-transform:uppercase;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:
    0 1px 0 rgba(255,255,255,.17) inset,
    0 -1px 0 rgba(0,0,0,.22) inset,
    0 4px 22px rgba(212,175,55,.38);
  transition:all .3s cubic-bezier(.4,0,.2,1);
}
.btn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:48%;
  background:linear-gradient(180deg,rgba(255,255,255,.14),transparent);pointer-events:none;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 28%,rgba(255,255,255,.28) 50%,transparent 72%);
  transform:translateX(-160%);transition:transform .7s ease;
}
.btn:hover::after{transform:translateX(160%)}
.btn:hover{
  background-position:100% 0;
  box-shadow:0 1px 0 rgba(255,255,255,.2) inset,0 -1px 0 rgba(0,0,0,.22) inset,0 8px 32px rgba(212,175,55,.6);
  transform:translateY(-2px);
}
.btn:active{transform:translateY(0)}

/* tagline */
.tagline{
  margin-top:26px;
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-weight:300;
  font-size:12px;letter-spacing:.1em;
  color:rgba(212,175,55,.28);text-align:center;
}
</style>
</head>

<div class="spotlight"></div>

<div class="col-l"></div>

<div class="wrap">

    <div class="ring-outer">
