<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#070604">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Golden Cardápio</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700;900&family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --gold-1: #F8E88A;
  --gold-2: #E2B93B;
  --gold-3: #C9960C;
  --gold-4: #8B6208;
  --gold-5: #3D2900;
  --bg-0: #070604;
  --bg-1: #0F0D08;
  --bg-2: #181408;
  --bg-3: #211C0D;
  --bg-4: #2C2410;
  --border: rgba(226,185,59,0.15);
  --border-2: rgba(226,185,59,0.3);
  --text: #F0E2C0;
  --muted: #7A6830;
  --red: #C0392B;
  --green: #1D6A3A;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
  --shadow-gold: 0 20px 40px -15px rgba(226,185,59,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg-0); color:var(--text); font-family:'Nunito',sans-serif; overflow-x:hidden; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:linear-gradient(180deg,var(--gold-3),var(--gold-4)); border-radius:10px; }

/* ── PAGES ── */
.pg { display:none; min-height:100vh; flex-direction:column; }
.pg.on { display:flex; }
.pg-enter { animation: pgIn 0.45s cubic-bezier(0.4,0,0.2,1) forwards; }
.pg-exit  { animation: pgOut 0.3s cubic-bezier(0.4,0,0.2,1) forwards; }

@keyframes pgIn  { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes pgOut { from{opacity:1;transform:translateY(0)}    to{opacity:0;transform:translateY(-10px)} }
@keyframes fadeIn{ from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:translateY(0)} }
@keyframes scaleIn{from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)}}
@keyframes spin  { to{transform:rotate(360deg)} }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.12);opacity:1} }
@keyframes shimmer{ 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes floatUp{ 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(-120vh) rotate(720deg);opacity:0} }
@keyframes starPop{ 0%{transform:scale(0) rotate(-30deg);opacity:0} 60%{transform:scale(1.2) rotate(5deg);opacity:1} 100%{transform:scale(1) rotate(0deg);opacity:1} }
@keyframes barGlow{ 0%,100%{box-shadow:0 0 8px rgba(226,185,59,.4)} 50%{box-shadow:0 0 22px rgba(226,185,59,.8)} }

/* ── LOADING SCREEN ── */
#gcLoad {
  position:fixed; inset:0; background:var(--bg-0); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px;
  transition:opacity .5s ease;
}
.gc-logo-wrap {
  position:relative; display:flex; align-items:center; justify-content:center;
}
.gc-logo-ring {
  position:absolute; width:160px; height:160px;
  border:1.5px solid rgba(226,185,59,.12); border-radius:50%;
}
.gc-logo-ring2 {
  position:absolute; width:195px; height:195px;
  border:1px solid rgba(226,185,59,.06); border-radius:50%;
  animation:spin 8s linear infinite;
  border-top-color:rgba(226,185,59,.25);
}
.gc-logo { width:120px; height:120px; object-fit:contain; animation:pulse 2.5s ease-in-out infinite; filter:drop-shadow(0 0 40px rgba(226,185,59,.55)); }
.gc-logo-fallback { font-size:72px; animation:pulse 2.5s ease-in-out infinite; }
.gc-spinner {
  width:44px; height:44px; position:relative;
}
.gc-spinner-ring {
  position:absolute; inset:0; border:2px solid rgba(226,185,59,.08); border-radius:50%;
}
.gc-spinner-arc {
  position:absolute; inset:0; border:2px solid transparent;
  border-top-color:var(--gold-2); border-radius:50%;
  animation:spin .9s linear infinite;
}
.gc-msg {
  font-size:11px; color:var(--muted); letter-spacing:.25em; text-transform:uppercase;
  text-align:center; padding:0 20px; min-height:18px;
}
.gc-dots span {
  display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--gold-4);
  margin:0 3px; animation:pulse 1.2s ease-in-out infinite;
}
.gc-dots span:nth-child(2){animation-delay:.2s}
.gc-dots span:nth-child(3){animation-delay:.4s}

/* ── TOPBAR ── */
.topbar {
  background:rgba(7,6,4,.97); backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border); padding:11px 18px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:300;
}
.tb-brand {
  display:flex; align-items:center; gap:10px;
  font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:900;
  background:linear-gradient(135deg,var(--gold-2),var(--gold-1));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.tb-brand img { height:32px; filter:drop-shadow(0 2px 8px rgba(226,185,59,.35)); }

.avatar-btn {
  width:42px; height:42px; border-radius:50%;
  border:2px solid var(--border-2); background:var(--bg-3);
  cursor:pointer; overflow:hidden; display:flex; align-items:center;
  justify-content:center; font-size:18px; transition:all .3s;
  position:relative;
}
.avatar-btn:hover { border-color:var(--gold-2); transform:scale(1.08); box-shadow:0 0 18px rgba(226,185,59,.25); }
.avatar-btn img { width:100%; height:100%; object-fit:cover; }
.avatar-btn .notif-dot {
  position:absolute; top:2px; right:2px; width:10px; height:10px;
  background:var(--gold-2); border-radius:50%; border:2px solid var(--bg-0);
  display:none;
}

/* ── PROGRESS BAR ── */
.progress-bar-wrap {
  height:3px; background:rgba(226,185,59,.07); position:relative; overflow:hidden;
}
.progress-bar-fill {
  height:100%; background:linear-gradient(90deg,var(--gold-4),var(--gold-2),var(--gold-1));
  border-radius:0 2px 2px 0; transition:width .5s cubic-bezier(.4,0,.2,1);
  animation:barGlow 2s ease-in-out infinite;
}

/* ── LOGIN PAGE ── */
#pgLogin {
  justify-content:center; align-items:center; padding:20px; min-height:100vh;
  background:radial-gradient(ellipse at 50% -10%, rgba(226,185,59,.18) 0%, transparent 65%), var(--bg-0);
  position:relative; overflow:hidden;
}

/* Partículas */
.particle {
  position:absolute; pointer-events:none; border-radius:50%;
  background:radial-gradient(circle, rgba(226,185,59,.9), rgba(226,185,59,0));
  animation:floatUp linear infinite;
}

.login-shell { width:min(420px,100%); display:flex; flex-direction:column; align-items:center; position:relative; z-index:1; }

.login-brand { display:flex; flex-direction:column; align-items:center; margin-bottom:28px; text-align:center; animation:starPop .7s cubic-bezier(.4,0,.2,1) forwards; }
.login-brand img { width:96px; height:auto; margin-bottom:14px; filter:drop-shadow(0 10px 35px rgba(226,185,59,.45)); transition:all .3s; }
.login-brand img:hover { transform:scale(1.06) rotate(-2deg); filter:drop-shadow(0 14px 45px rgba(226,185,59,.65)); }
.wordmark {
  font-family:'Cormorant Garamond',serif; font-weight:900;
  font-size:clamp(44px,12vw,60px); letter-spacing:.12em;
  background:linear-gradient(180deg,#F8E88A 0%,#E2B93B 40%,#8B6208 70%,#C9960C 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1;
}
.wordsub { font-size:11px; letter-spacing:.42em; text-transform:uppercase; color:var(--muted); margin-top:9px; }

.login-card {
  width:100%; background:rgba(24,20,8,.85); backdrop-filter:blur(30px);
  border:1px solid rgba(226,185,59,.18); border-radius:28px;
  padding:32px 26px 28px; box-shadow:0 40px 80px -20px rgba(0,0,0,.9), inset 0 1px 0 rgba(226,185,59,.1);
  animation:pgIn .5s .1s cubic-bezier(.4,0,.2,1) both;
}

.lbl { display:block; font-size:10px; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }

.inp {
  width:100%; background:rgba(255,255,255,.04); border:2px solid rgba(226,185,59,.13);
  color:var(--text); padding:15px 17px; border-radius:var(--radius-sm);
  font-size:16px; font-family:'Nunito',sans-serif; font-weight:600;
  outline:none; transition:all .3s; margin-bottom:18px;
}
.inp:focus { border-color:var(--gold-3); background:rgba(226,185,59,.07); box-shadow:0 0 0 3px rgba(226,185,59,.1); }
.inp option { background:var(--bg-2); color:var(--text); }

.pin-section { margin-bottom:6px; }
.pin-label { font-size:10px; font-weight:800; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; display:block; }

.pin-disp { display:flex; justify-content:center; gap:16px; margin-bottom:22px; }
.pin-dot {
  width:22px; height:22px; border-radius:50%;
  border:2.5px solid rgba(226,185,59,.22); transition:all .25s cubic-bezier(.4,0,.2,1);
}
.pin-dot.on {
  background:linear-gradient(135deg,var(--gold-3),var(--gold-2));
  border-color:var(--gold-2); box-shadow:0 0 18px rgba(226,185,59,.55);
  transform:scale(1.12);
}

.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:12px; }
.pk {
  background:var(--bg-3); border:1px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text);
  font-size:24px; font-weight:800; padding:16px 0;
  cursor:pointer; transition:all .2s; user-select:none;
  position:relative; overflow:hidden;
}
.pk::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background:radial-gradient(circle at center, rgba(226,185,59,.25), transparent 70%);
  opacity:0; transition:opacity .2s;
}
.pk:active::after { opacity:1; }
.pk:active { transform:scale(.93); background:rgba(226,185,59,.14); }
.pk.zero { grid-column:2; }
.pk.del { background:rgba(192,57,43,.1); border-color:rgba(192,57,43,.2); color:#e07060; font-size:20px; }
.pk.del:active { background:rgba(192,57,43,.22); }

.login-err {
  color:#f08070; font-size:13px; font-weight:700; text-align:center;
  padding:11px; background:rgba(192,57,43,.12); border:1px solid rgba(192,57,43,.25);
  border-radius:var(--radius-xs); margin:8px 0; display:none; animation:scaleIn .2s ease;
}
.login-err.on { display:block; }

.btn-enter {
  width:100%; background:linear-gradient(135deg,var(--gold-4),var(--gold-2),var(--gold-1));
  border:none; color:var(--bg-0); font-size:17px; font-weight:900;
  padding:17px; border-radius:var(--radius-sm); cursor:pointer;
  margin-top:14px; transition:all .3s; box-shadow:var(--shadow-gold);
  letter-spacing:.05em; position:relative; overflow:hidden;
}
.btn-enter::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.18),transparent 70%);
  transform:translateX(-100%); transition:transform .5s ease;
}
.btn-enter:hover::before { transform:translateX(100%); }
.btn-enter:hover { filter:brightness(1.1); transform:translateY(-3px); box-shadow:0 18px 40px rgba(226,185,59,.45); }
.btn-enter:active { transform:translateY(-1px); }

/* ── SKELETON ── */
.skel {
  background:linear-gradient(90deg,var(--bg-3) 25%,var(--bg-4) 50%,var(--bg-3) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px;
}

/* ── ADMIN TABS ── */
.adm-tabs {
  display:flex; gap:4px; padding:14px 14px 0;
  border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none;
  background:rgba(7,6,4,.6); backdrop-filter:blur(12px);
  position:sticky; top:56px; z-index:200;
}
.adm-tabs::-webkit-scrollbar { display:none; }
.atab {
  background:transparent; border:none; border-bottom:3px solid transparent;
  color:var(--muted); padding:11px 18px; font-family:'Nunito',sans-serif;
  font-size:12px; font-weight:800; cursor:pointer; white-space:nowrap;
  letter-spacing:.06em; text-transform:uppercase; transition:all .25s; border-radius:8px 8px 0 0;
}
.atab:hover { color:var(--text); background:rgba(226,185,59,.05); }
.atab.on { color:var(--gold-1); border-bottom-color:var(--gold-2); background:rgba(226,185,59,.07); }

.apanel { display:none; padding:18px 14px; max-width:1020px; margin:0 auto; padding-bottom:40px; }
.apanel.on { display:block; animation:fadeIn .35s ease; }

/* ── STATS CARDS ── */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
.stat-card {
  background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:18px; display:flex; flex-direction:column; gap:6px; transition:all .3s;
}
.stat-card:hover { border-color:var(--border-2); transform:translateY(-3px); box-shadow:var(--shadow-gold); }
.stat-ico { font-size:26px; }
.stat-val { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:900; color:var(--gold-1); line-height:1; }
.stat-lbl { font-size:11px; color:var(--muted); font-weight:700; letter-spacing:.06em; text-transform:uppercase; }

/* ── CARDS ── */
.card {
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:var(--radius); padding:22px; margin-bottom:18px; box-shadow:var(--shadow);
}
.card-title { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:700; color:var(--gold-1); margin-bottom:4px; }
.card-sub { font-size:12px; color:var(--muted); letter-spacing:.06em; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--border); }

/* ── SEARCH ── */
.search-wrap { position:relative; margin-bottom:16px; }
.search-wrap input { padding-left:40px; }
.search-ico { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; pointer-events:none; margin-top:-9px; }

/* ── PEDIDOS ── */
.ped-card {
  background:var(--bg-3); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:16px; margin-bottom:10px; transition:all .3s; animation:fadeIn .3s ease;
}
.ped-card:hover { border-color:var(--border-2); transform:translateX(3px); }
.ped-nome { font-size:16px; font-weight:900; }
.ped-cargo { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-top:1px; }
.ped-date { font-size:11px; color:var(--gold-3); font-weight:800; }
.ped-row {
  display:flex; align-items:flex-start; gap:10px; padding:8px 10px;
  background:rgba(255,255,255,.025); border-radius:7px; margin-bottom:5px;
}
.ped-dia { font-size:10px; font-weight:800; color:var(--gold-3); letter-spacing:.1em; text-transform:uppercase; width:78px; flex-shrink:0; padding-top:2px; }
.ped-prato { font-size:13px; font-weight:800; display:flex; align-items:center; gap:6px; }
.ped-obs { font-size:11px; color:var(--muted); font-style:italic; margin-top:2px; }
.ped-footer { font-size:10px; color:var(--muted); margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }

/* ── TOP PRATOS ── */
.top-prato-row {
  display:flex; align-items:center; gap:12px; padding:10px 14px;
  background:var(--bg-3); border:1px solid var(--border); border-radius:10px; margin-bottom:7px; transition:all .3s;
}
.top-prato-row:hover { border-color:var(--border-2); }
.top-rank { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:900; color:var(--gold-4); width:26px; }
.top-rank.gold { color:var(--gold-2); }
.top-bar-wrap { flex:1; }
.top-bar-name { font-size:13px; font-weight:800; margin-bottom:4px; }
.top-bar-bg { height:5px; background:rgba(226,185,59,.1); border-radius:3px; overflow:hidden; }
.top-bar-fill { height:100%; background:linear-gradient(90deg,var(--gold-4),var(--gold-2)); border-radius:3px; transition:width .8s cubic-bezier(.4,0,.2,1); }
.top-count { font-size:12px; color:var(--gold-2); font-weight:800; }

/* ── ACCORD ── */
.accord { border:1px solid var(--border); border-radius:var(--radius-sm); margin-bottom:8px; overflow:hidden; transition:all .3s; }
.accord:hover { border-color:var(--border-2); }
.accord-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 15px; background:rgba(226,185,59,.04); cursor:pointer; transition:background .2s;
}
.accord-hd:hover { background:rgba(226,185,59,.08); }
.accord-hd-left { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:800; }
.accord-arrow { color:var(--gold-3); font-size:14px; transition:transform .3s; }
.accord-arrow.open { transform:rotate(180deg); }
.accord-body { display:none; padding:14px 15px; border-top:1px solid var(--border); }
.accord-body.open { display:block; animation:fadeIn .25s ease; }

.chip {
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius-xs); padding:6px 10px; font-size:12px; font-weight:700;
  display:inline-flex; align-items:center; gap:6px; margin:3px; transition:all .2s;
}
.chip:hover { border-color:var(--border-2); background:rgba(226,185,59,.07); }
.chip-x { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; transition:color .2s; padding:0 2px; }
.chip-x:hover { color:#e07060; }

.add-inp {
  flex:1; background:rgba(255,255,255,.03); border:2px solid var(--border);
  color:var(--text); padding:10px 13px; border-radius:var(--radius-xs);
  font-size:13px; outline:none; transition:all .3s; font-family:'Nunito',sans-serif;
}
.add-inp:focus { border-color:var(--gold-3); background:rgba(226,185,59,.06); }

/* ── USER GRID ── */
.user-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:13px; }
.user-card {
  background:var(--bg-3); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:18px; transition:all .3s;
}
.user-card:hover { transform:translateY(-4px); border-color:var(--border-2); box-shadow:0 18px 35px -14px rgba(226,185,59,.2); }
.uc-name { font-size:17px; font-weight:900; }
.uc-cargo { font-size:10px; color:var(--gold-3); font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-top:1px; margin-bottom:10px; }
.uc-login { font-size:12px; color:var(--gold-2); font-weight:700; margin-bottom:13px; padding:7px 10px; background:rgba(226,185,59,.05); border-radius:7px; display:inline-block; }

.badge-a, .badge-u, .badge-offline {
  display:inline-block; padding:4px 11px; border-radius:20px;
  font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase;
}
.badge-a { background:linear-gradient(135deg,var(--gold-4),var(--gold-3)); color:var(--bg-0); }
.badge-u { background:rgba(255,255,255,.07); color:var(--muted); border:1px solid rgba(255,255,255,.1); }
.badge-offline { background:rgba(255,100,60,.12); color:#f08878; border:1px solid rgba(255,100,60,.2); }

/* ── BTNs ── */
.btn {
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  border:none; border-radius:var(--radius-xs); font-family:'Nunito',sans-serif;
  font-weight:800; cursor:pointer; transition:all .25s; padding:11px 22px; font-size:13px;
}
.btn-g { background:linear-gradient(135deg,var(--gold-4),var(--gold-2)); color:var(--bg-0); box-shadow:var(--shadow-gold); }
.btn-g:hover { filter:brightness(1.12); transform:translateY(-2px); box-shadow:0 14px 28px rgba(226,185,59,.3); }
.btn-outline { background:transparent; border:2px solid var(--border-2); color:var(--text); }
.btn-outline:hover { border-color:var(--gold-3); color:var(--gold-1); background:rgba(226,185,59,.05); }
.btn-danger { background:rgba(192,57,43,.1); border:1px solid rgba(192,57,43,.25); color:#e07060; }
.btn-danger:hover { background:rgba(192,57,43,.2); border-color:rgba(192,57,43,.35); }
.btn-sm { padding:9px 16px; font-size:12px; }

/* ── FOOD CARDS ── */
.food-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(136px,1fr)); gap:10px; margin-bottom:13px; }

.food-card {
  background:var(--bg-2); border:2px solid rgba(255,255,255,.055);
  border-radius:var(--radius); cursor:pointer; transition:all .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden; display:flex; flex-direction:column; align-i
