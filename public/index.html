<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Cardápio</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="icon" type="image/png" href="./images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div class="slogan">É fácil ser feliz aqui</div>
        <div class="logo-container">
            <div class="logo-placeholder"><i class="fas fa-diamond"></i></div>
        </div>
    </div>

    <!-- CADASTRO -->
    <section id="tela-cadastro" class="container hidden">
        <h1>GOLDEN SHOPPING</h1>
        <input type="text" id="nome" placeholder="Nome e sobrenome" autofocus>
        <select id="cargo">
            <option value="">Selecione seu setor/cargo</option>
            <option value="Administrativo">Administrativo</option>
            <option value="Financeiro">Financeiro</option>
            <option value="Recursos Humanos">Recursos Humanos</option>
            <option value="TI">Tecnologia da Informação</option>
            <option value="Marketing">Marketing</option>
            <option value="Segurança">Segurança</option>
            <option value="Portaria">Portaria</option>
            <option value="Limpeza">Limpeza</option>
            <option value="Manutenção">Manutenção</option>
            <option value="Recepção">Recepção</option>
            <option value="Atendimento">Atendimento</option>
            <option value="Operacional">Operacional</option>
            <option value="Gerência">Gerência</option>
            <option value="Estacionamento">Estacionamento</option>
            <option value="Jurídico">Jurídico</option>
            <option value="Compras">Compras</option>
            <option value="Contabilidade">Contabilidade</option>
            <option value="Outro">Outro</option>
        </select>
        <button onclick="continuar()">CONTINUAR →</button>
    </section>

    <!-- SELEÇÃO DE DIAS -->
    <section id="tela-dias" class="container hidden">
        <h2>SELECIONE O DIA</h2>
        <div class="dias-grid" id="dias-lista"></div>
    </section>

    <!-- SELEÇÃO DE PRATOS -->
    <section id="tela-pratos" class="container hidden">
        <h2 id="dia-titulo">SEGUNDA-FEIRA</h2>
        <p style="color: #888; margin-bottom: 20px; text-align: center;">Toque para ouvir o prato</p>
        <div class="pratos-grid" id="pratos-lista"></div>
    </section>

    <!-- FINAL -->
    <section id="tela-final" class="hidden">
        <div class="check-icon"><i class="fas fa-check-circle"></i></div>
        <h2>CARDÁPIO ENVIADO!</h2>
        <p>Você já fez seu pedido da semana.<br>Aguarde o próximo ciclo.</p>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">
            <i class="fab fa-whatsapp"></i> ENVIAR AO GRUPO
        </button>
    </section>

    <script src="./js/app.js"></script>
</body>
</html>
