<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin - Golden Cardápio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            color: #111;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .login-area {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 32px;
            border: 1px solid #eaeaea;
            text-align: center;
        }
        .login-area h2 {
            margin-bottom: 20px;
            color: #b8860b;
        }
        .login-area input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            background: white;
        }
        .login-area button {
            background: #111;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }
        .error {
            color: #d9534f;
            margin-top: 10px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 15px;
        }
        .stats {
            background: #fafaf8;
            border: 1px solid #eaeaea;
            padding: 12px 24px;
        }
        .stats h3 {
            color: #b8860b;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .stats p {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .section {
            margin-bottom: 30px;
            border: 1px solid #eaeaea;
            background: #fafaf8;
        }
        .section h3 {
            background: #f5f5f5;
            padding: 12px 20px;
            border-bottom: 1px solid #eaeaea;
            color: #b8860b;
            font-size: 1rem;
            margin: 0;
        }
        .list-container {
            padding: 12px 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .delete-user {
            background: #d9534f;
            color: white;
            border: none;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .delete-user:hover {
            background: #c9302c;
        }
        .day-card {
            margin-bottom: 30px;
            border: 1px solid #eaeaea;
            background: white;
        }
        .day-title {
            background: #f5f5f5;
            padding: 12px 20px;
            font-weight: 600;
            border-bottom: 1px solid #eaeaea;
            color: #b8860b;
        }
        .dishes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            padding: 20px;
        }
        .dish-item {
            border: 1px solid #eaeaea;
            background: #fafaf8;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .dish-item input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            font-family: 'Inter', sans-serif;
        }
        .icon-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .icon-row input {
            flex: 1;
        }
        .icon-preview {
            font-size: 1.6rem;
            width: 40px;
            text-align: center;
        }
        .dish-item button {
            background: #111;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 6px;
        }
        .dish-item button.delete-dish {
            background: #d9534f;
        }
        .add-dish {
            background: #b8860b;
            color: white;
            border: none;
            padding: 8px;
            width: calc(100% - 40px);
            margin: 0 20px 20px 20px;
            cursor: pointer;
            font-weight: 500;
        }
        .save-btn {
            background: #111;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            margin: 20px 0;
            font-weight: 600;
            cursor: pointer;
        }
        .logout {
            background: #f5f5f5;
            border: 1px solid #ddd;
            padding: 8px 16px;
            cursor: pointer;
        }
        .success-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #5cb85c;
            color: white;
            padding: 12px 24px;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @media (max-width: 700px) {
            .dishes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loginArea" class="login-area">
        <h2>🔐 Área Administrativa</h2>
        <input type="password" id="adminPassword" placeholder="Senha">
        <button onclick="login()">Acessar</button>
        <div id="loginError" class="error"></div>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="container">
            <div class="admin-header">
                <div class="stats">
                    <h3>📋 TOTAL DE PEDIDOS</h3>
                    <p id="totalOrders">0</p>
                </div>
                <button class="logout" onclick="logout()">Sair</button>
            </div>

            <div class="section">
                <h3>👥 Funcionários que já finalizaram</h3>
                <div id="ordersList" class="list-container"></div>
            </div>

            <div class="section">
                <h3>📝 Funcionários cadastrados</h3>
                <div id="registrationsList" class="list-container"></div>
            </div>

            <div id="daysContainer"></div>
            <button class="save-btn" onclick="saveMenu()">💾 Salvar e publicar para funcionários</button>
        </div>
    </div>

    <script>
        let menuData = [];

        function getDefaultMenu() {
            return [
                { dayName: "Segunda-feira", dishes: [{ name:"Filé de Frango", icon:"🍗" }, { name:"Bife à Parmegiana", icon:"🥩" }, { name:"Peixe ao Molho", icon:"🐟" }, { name:"Macarronada", icon:"🍝" }, { name:"Salada Tropical", icon:"🥗" }] },
                { dayName: "Terça-feira",   dishes: [{ name:"Strogonoff de Carne", icon:"🥘" }, { name:"Frango Assado", icon:"🍗" }, { name:"Lasanha Bolonhesa", icon:"🍝" }, { name:"Omelete Especial", icon:"🍳" }, { name:"Salada Caesar", icon:"🥗" }] },
                { dayName: "Quarta-feira",  dishes: [{ name:"Feijoada Light", icon:"🍲" }, { name:"Peixe Grelhado", icon:"🐟" }, { name:"Carne de Panela", icon:"🥩" }, { name:"Nhoque ao Sugo", icon:"🍝" }, { name:"Tofu Grelhado", icon:"🥬" }] },
                { dayName: "Quinta-feira",  dishes: [{ name:"Costela ao Forno", icon:"🍖" }, { name:"Frango à Milanesa", icon:"🍗" }, { name:"Risoto de Camarão", icon:"🍤" }, { name:"Espaguete ao Pesto", icon:"🍝" }, { name:"Hambúrguer Artesanal", icon:"🍔" }] },
                { dayName: "Sexta-feira",   dishes: [{ name:"Bacalhau Dourado", icon:"🐟" }, { name:"Filé Mignon", icon:"🥩" }, { name:"Moqueca Baiana", icon:"🥘" }, { name:"Pizza Integral", icon:"🍕" }, { name:"Salmão Grelhado", icon:"🐟" }] },
                { dayName: "Sábado",        dishes: [{ name:"Churrasco Misto", icon:"🍖" }, { name:"Fraldinha", icon:"🥩" }, { name:"Frango Caipira", icon:"🍗" }, { name:"Macarrão com Camarão", icon:"🍤" }, { name:"Risoto de Cogumelos", icon:"🍄" }] },
                { dayName: "Domingo",       dishes: [{ name:"Galinhada", icon:"🍗" }, { name:"Lombo Assado", icon:"🥩" }, { name:"Tutu à Mineira", icon:"🍲" }, { name:"Polenta Cremosa", icon:"🌽" }, { name:"Salpicão Especial", icon:"🥗" }] }
            ];
        }

        function loadMenu() {
            const saved = localStorage.getItem('golden_cardapio_admin');
            if (saved) {
                menuData = JSON.parse(saved);
            } else {
                menuData = getDefaultMenu();
                localStorage.setItem('golden_cardapio_admin', JSON.stringify(menuData));
            }
            renderMenu();
            updateStats();
        }

        function renderMenu() {
            const container = document.getElementById('daysContainer');
            container.innerHTML = '';
            menuData.forEach((day, dayIdx) => {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day-card';
                dayDiv.innerHTML = `
                    <div class="day-title">${day.dayName}</div>
                    <div class="dishes-grid" id="grid-${dayIdx}"></div>
                    <button class="add-dish" onclick="addDish(${dayIdx})">+ Adicionar prato</button>
                `;
                container.appendChild(dayDiv);

                const grid = dayDiv.querySelector(`#grid-${dayIdx}`);
                day.dishes.forEach((dish, dishIdx) => {
                    const dishDiv = document.createElement('div');
                    dishDiv.className = 'dish-item';
                    dishDiv.innerHTML = `
                        <input type="text" value="${dish.name.replace(/"/g, '&quot;')}" id="name-${dayIdx}-${dishIdx}" placeholder="Nome do prato">
                        <div class="icon-row">
                            <input type="text" value="${dish.icon || '🍽️'}" id="icon-${dayIdx}-${dishIdx}" placeholder="Emoji" maxlength="2" style="width: 60px;">
                            <div class="icon-preview" id="preview-${dayIdx}-${dishIdx}">${dish.icon || '🍽️'}</div>
                            <button onclick="updateDish(${dayIdx}, ${dishIdx})">💾 Salvar</button>
                            <button class="delete-dish" onclick="removeDish(${dayIdx}, ${dishIdx})">🗑️</button>
                        </div>
                    `;
                    grid.appendChild(dishDiv);

                    // Preview ao vivo
                    const iconInput = dishDiv.querySelector(`#icon-${dayIdx}-${dishIdx}`);
                    const preview = dishDiv.querySelector(`#preview-${dayIdx}-${dishIdx}`);
                    iconInput.addEventListener('input', () => {
                        preview.innerText = iconInput.value || '🍽️';
                    });
                });
            });
        }

        function addDish(dayIdx) {
            menuData[dayIdx].dishes.push({ name: "Novo Prato", icon: "🍽️" });
            renderMenu();
        }

        function updateDish(dayIdx, dishIdx) {
            const nameInput = document.getElementById(`name-${dayIdx}-${dishIdx}`);
            const iconInput = document.getElementById(`icon-${dayIdx}-${dishIdx}`);
            const newName = nameInput.value.trim();
            const newIcon = iconInput.value.trim() || '🍽️';
            if (newName) {
                menuData[dayIdx].dishes[dishIdx] = { name: newName, icon: newIcon };
                renderMenu();
            } else {
                alert("Digite um nome válido.");
            }
        }

        function removeDish(dayIdx, dishIdx) {
            if (menuData[dayIdx].dishes.length <= 1) {
                alert("Cada dia precisa ter pelo menos um prato!");
                return;
            }
            menuData[dayIdx].dishes.splice(dishIdx, 1);
            renderMenu();
        }

        function saveMenu() {
            localStorage.setItem('golden_cardapio_admin', JSON.stringify(menuData));
            // Dispara evento para funcionários
            window.dispatchEvent(new StorageEvent('storage', {
                key: 'golden_cardapio_admin',
                newValue: JSON.stringify(menuData)
            }));
            showSuccess("✅ Cardápio salvo e publicado!");
        }

        function updateStats() {
            const orders = JSON.parse(localStorage.getItem('golden_orders') || '[]');
            const completedOrders = orders.filter(o => o.completed).length;
            document.getElementById('totalOrders').innerText = completedOrders;

            const ordersList = document.getElementById('ordersList');
            if (completedOrders === 0) {
                ordersList.innerHTML = '<p style="color:#aaa;">Nenhum pedido finalizado.</p>';
            } else {
                ordersList.innerHTML = orders.filter(o => o.completed).map(o => `
                    <div class="list-item">
                        <span>${o.name} (${o.sector})</span>
                        <button class="delete-user" onclick="deleteUser('${o.name}')">Remover</button>
                    </div>
                `).join('');
            }

            const registrations = JSON.parse(localStorage.getItem('golden_registrations') || '[]');
            const regList = document.getElementById('registrationsList');
            if (registrations.length === 0) {
                regList.innerHTML = '<p style="color:#aaa;">Nenhum funcionário cadastrado.</p>';
            } else {
                regList.innerHTML = registrations.map(r => `
                    <div class="list-item">
                        <span>${r.name} (${r.sector}) - Cadastro: ${new Date(r.registrationDate).toLocaleDateString()}</span>
                        <button class="delete-user" onclick="deleteUser('${r.name}')">Remover</button>
                    </div>
                `).join('');
            }
        }

        function deleteUser(name) {
            if (confirm(`Remover ${name} permanentemente?`)) {
                let orders = JSON.parse(localStorage.getItem('golden_orders') || '[]');
                orders = orders.filter(o => o.name !== name);
                localStorage.setItem('golden_orders', JSON.stringify(orders));

                let registrations = JSON.parse(localStorage.getItem('golden_registrations') || '[]');
                registrations = registrations.filter(r => r.name !== name);
                localStorage.setItem('golden_registrations', JSON.stringify(registrations));

                const userData = localStorage.getItem('golden_cardapio_user');
                if (userData) {
                    try {
                        const parsed = JSON.parse(userData);
                        if (parsed.user?.name === name) {
                            localStorage.removeItem('golden_cardapio_user');
                        }
                    } catch(e) {}
                }
                updateStats();
                showSuccess(`✅ ${name} removido com sucesso.`);
            }
        }

        function showSuccess(msg) {
            const div = document.createElement('div');
            div.className = 'success-msg';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2000);
        }

        function login() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === "2026") {
                localStorage.setItem('admin_logged', 'true');
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadMenu();
            } else {
                document.getElementById('loginError').innerText = 'Senha incorreta!';
            }
        }

        function logout() {
            localStorage.removeItem('admin_logged');
            document.getElementById('loginArea').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').innerText = '';
        }

        function checkLogin() {
            if (localStorage.getItem('admin_logged') === 'true') {
                document.getElementById('loginArea').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadMenu();
            }
        }

        checkLogin();
    </script>
</body>
</html>
